services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: markdownreview_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-markdownreview}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markdownreview_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-markdownreview}
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5}
    ports:
      - '3000:3000'
    networks:
      - app_network
    # Run Prisma migrations on startup
    command: sh -c "npx prisma migrate deploy && npm start"

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
