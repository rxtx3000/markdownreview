services:
  # Override for local development
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

  # Expose database port for local access (5433 to avoid conflict with local PostgreSQL)
  db:
    ports:
      - '5433:5432'
